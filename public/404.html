<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Not Found</title>
  </head>
  <body>
    <script>
      (function () {
        var path = window.location.pathname || '/';
        var search = window.location.search || '';
        var hash = window.location.hash || '';

        // SPA fallback for owner-target LearnOnTheGo deep links on GitHub Pages.
        if (path.startsWith('/learnonthego/')) {
          var redirect = '/learnonthego/?redirect=' + encodeURIComponent(path + search) + hash;
          window.location.replace(redirect);
          return;
        }

        document.body.innerHTML =
          '<main style="font-family: sans-serif; max-width: 680px; margin: 3rem auto; padding: 0 1rem;">' +
          '<h1>Page not found</h1>' +
          '<p>The requested page does not exist.</p>' +
          '<p><a href="/">Return to homepage</a></p>' +
          '</main>';
      })();
    </script>
  </body>
</html>
