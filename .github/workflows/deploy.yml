name: Deploy Astro site to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npm run build

      - name: Inject LearnOnTheGo runtime config
        env:
          LOTG_API_BASE_URL: ${{ vars.LOTG_API_BASE_URL }}
        run: |
          API_BASE_URL="${LOTG_API_BASE_URL:-https://learnonthego-production.up.railway.app}"
          mkdir -p dist/learnonthego
          cat > dist/learnonthego/runtime-config.js <<EOF
          window.__LOTG_CONFIG__ = {
            apiBaseUrl: "${API_BASE_URL}",
            generatedAtUtc: "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          };
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
